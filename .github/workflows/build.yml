name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write  # softprops/action-gh-release needs this to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/SpaceMouseRepo.sln

      - name: Test
        run: dotnet test src/SpaceMouseRepo.sln --no-restore --verbosity normal

      - name: Build plugin (Release)
        run: dotnet build src/SpaceMouseRepo.Plugin -c Release --no-restore

      - name: Stage Thunderstore package
        shell: pwsh
        run: |
          $version = (Get-Content thunderstore/manifest.json | ConvertFrom-Json).version_number
          Add-Content -Path $env:GITHUB_ENV -Value "PACKAGE_VERSION=$version"
          $stage = "stage"
          $pluginDir = "$stage/BepInEx/plugins/SpaceMouseRepo"
          New-Item -ItemType Directory -Force -Path $pluginDir | Out-Null
          Copy-Item src/SpaceMouseRepo.Plugin/bin/Release/net472/SpaceMouseRepo.dll      $pluginDir
          Copy-Item src/SpaceMouseRepo.Plugin/bin/Release/net472/SpaceMouseRepo.Core.dll $pluginDir
          Copy-Item src/SpaceMouseRepo.Plugin/bin/Release/net472/HidLibrary.dll          $pluginDir
          Copy-Item thunderstore/manifest.json $stage
          Copy-Item thunderstore/icon.png      $stage
          Copy-Item thunderstore/README.md     $stage
          Compress-Archive -Path "$stage/*" -DestinationPath "SpaceMouseRepo-$version.zip" -Force
          Write-Output "Built SpaceMouseRepo-$version.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: thunderstore-package
          path: SpaceMouseRepo-*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SpaceMouseRepo-*.zip

      - name: Install Thunderstore CLI
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          # tcli has only pre-releases, so 'latest/download' returns 404. Pin a known-good version.
          $tcliVersion = "0.2.4"
          $url = "https://github.com/thunderstore-io/thunderstore-cli/releases/download/$tcliVersion/tcli-$tcliVersion-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile tcli.zip
          Expand-Archive -Path tcli.zip -DestinationPath tcli -Force

      - name: Verify thunderstore.toml version matches manifest
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tomlVersion = (Select-String -Path thunderstore.toml -Pattern '^versionNumber\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ($tomlVersion -ne $env:PACKAGE_VERSION) {
            Write-Error "Version mismatch: thunderstore.toml=$tomlVersion, manifest.json=$env:PACKAGE_VERSION. Bump both before tagging."
            exit 1
          }
          Write-Output "Version $tomlVersion matches across files."

      - name: Publish to Thunderstore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TCLI_AUTH_TOKEN: ${{ secrets.TCLI_AUTH_TOKEN }}
        shell: pwsh
        run: |
          $tcli = Get-ChildItem -Path tcli -Filter tcli.exe -Recurse | Select-Object -First 1
          & $tcli.FullName publish --file "SpaceMouseRepo-$env:PACKAGE_VERSION.zip"
